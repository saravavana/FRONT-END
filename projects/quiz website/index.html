<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Quiz website</title>
</head>

<body>


    <div class="home">
        <div class="re-card">
            <h1><i class="fa-solid fa-bomb"></i> Quiz Master</h1>
            <h3>General Knowledge Quiz</h3>
            <p>
                Challenge yourself with 15 exciting questions.
            </p>
            <div class="details">
                <div>
                    <i class="fa-solid fa-circle-question"></i>
                    <span>15 Questions</span>
                </div>
                <div>
                    <i class="fa-solid fa-clock"></i>
                    <span>15 Seconds</span>
                </div>
                <div>
                    <i class="fa-solid fa-chart-column"></i>
                    <span>Pass: 50%</span>
                </div>
                <div>
                    <i class="fa-solid fa-trophy"></i>
                    <span>High Score Saved</span>
                </div>
            </div>
            <button onclick="home()" id="startBtn">
                 Start Quiz
            </button>
        </div>

    </div>


    <div class="container">
        <h2 id="hide">General Knowledge</h2>
        <div id="wrap">
            
        <div class="quiz-box">
            <div class="bg"></div>
            <div class="content">
                <div class="top-bar">
                    <h3 id="questionNumber"></h3>
                    <div class="progress">
                        <div id="progressBar"></div>
                    </div>
                    <h3 id="timer">15</h3>
                </div>
                <h2 id="question">Question comes here</h2>
                <button class="option">option1</button>
                <button class="option">option2</button>
                <button class="option">option3</button>
                <button class="option">option4</button>
                <button id="next">next</button>


            </div>
        </div>

        <div id="resultBox">
            <img src="images/trophy.png" alt="trophy">
            <h2 id="finalScore"></h2>
            <h2 id="percentage"></h2>
            <h2 id="highScore">High Score : 0</h2>
            <button id="restart">
                Restart Quiz
            </button>
            <button id="review">Review Answers</button>
        </div>
        <div id="reviewbox"><button id="back"> <i class="fa-solid fa-arrow-left"></i>back</button>

        </div>
        
        </div>
        
    </div>


    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
