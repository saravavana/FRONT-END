<html>
<head></head>

<body>
    <DIV id="SAM">
    <div class="one">

     <div class="two">
<h1 >welcome</h1>

     <div class="tree">

     <DIV id="ram">

     <div class="ltree">

 <style>
    #SAM{
        display: flex;
         justify-content: center;
        text-align: center;     
    }
    .one,.two,.tree{
         position: relative;
         margin: 5px;
        width: 200px;
        height: 200px;
        background-color: rgb(174, 75, 219);
    }

    .one:hover{
        background-color: rgba(255, 38, 0, 0.575);
        transition-duration: 10s;
        width: 230px;
        transform: skew(30deg);
    }
    .two:hover{
        background-color: rgb(238, 255, 0);
        transition-delay: 1s;
        transition-duration: 3s;
        width: 230px;
        transform: scale(2);
    }
    .tree:hover{
        background-color: rgb(0, 17, 255);
        transition-delay: 1s;
        transition-duration: 3s;
        width: 230px;
        transform: rotate(340deg);
    }
    .lone,.rtwo,.ltree,.lfour{
         margin: 5px;
        width: 200px;
        height: 100px;
        background-color: rgb(174, 75, 219);
    }
    .lone:hover{
        background-color: rgba(255, 38, 0, 0.575);
        transition-delay: 1s;
        transition-duration: 10s;
        transition-timing-function: ease;
        width: 230px;
    }
    .rtwo:hover{
        background-color: rgb(238, 255, 0);
        transition-delay: 1s;
        transition-duration: 3s;
        transition-timing-function: ease-in;
        width: 230px;
    }
    .ltree:hover{
        background-color: rgb(0, 17, 255);
        transition-delay: 1s;
        transition-duration: 3s;
        transition-timing-function: ease-out;
        width: 230px;
    }
    .lfour:hover{
        background-color: rgb(0, 204, 255);
        transition-delay: 1s;
        transition-duration: 3s;
        transition-timing-function: linear;
        width: 230px;
    }
    h1{
        color: beige;
    }
 </style>   
</body>



</html>
