<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <div></div>
        <style>
            body{
                width: 100vw;
                height: 100vh;
                display: flex;
                justify-content: start;
                background-color: rgba(0, 217, 255, 0.233);
            }
            div{
                width: 100px;
                height: 100px;
                background-color: red;
                transition-timing-function: 10s;
                border: 30px dashed whitesmoke;
                border-radius: 50%;
                animation-name: ball;
                animation-duration: 10s;
                position: relative;
                animation-iteration-count: infinite;

            }
            
            @keyframes ball {
                1%{
                    top: 1px;
                    left: 10px;
                }
                25%{
                    top: 100px;
                    left: 87vw;
                    background-color: black;
                    
                }
                40%{
                    top: 230px;
                    left: 0px;
                    background-color: blueviolet;
                }
                70%{
                    top: 330px;
                    left: 87vw;
                    background-color: crimson;
                }
                100%{
                    top: 450px;
                    left: 0px;
                    background-color: darkkhaki;
                }

                
            }
        </style>
    </body>
</html>
