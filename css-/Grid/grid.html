<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <div class="container">
            <div class="a"><h1>HEAD</h1></div>
            <div class="b"><h1>LEFT</h1></div>
            <div class="c"><h1>RIGHT</h1></div>
            <div class="d"><h1>FOOTER</h1></div>
        </div>
        <style>
            body{
                background-color: rgba(133, 182, 255, 0.658);
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .container{
                width: 600PX;
                text-align: center;
                display: grid;
                grid-template-columns: 300px 1fr 200px;
                grid-template-rows: 200px 300px  80px ;
                gap: 10px;
            }
            .a{
                grid-column: 1/4;

                background-color: rgb(248, 126, 126);
            }
            .b{
                grid-row: 2/3;
                grid-column: 1/3;
                background-color: rgb(119, 119, 253);
            }
            .c{
                grid-column: 3/4;
                
                background-color: rgb(228, 217, 217);
            }
            .d{
                grid-column: 1/4;
                grid-row: 3/4;
                background-color: rgb(248, 168, 111);
            }

        </style>
    </body>
</html>
